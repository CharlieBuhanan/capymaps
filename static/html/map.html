<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capymaps</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/map.css">
    <link rel="icon" href="../assets/capys/map.png" type="image/x-icon">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Momo+Trust+Sans:wght@200..800&display=swap" rel="stylesheet">

    <script src="../js/capy.js" type="module" defer></script>
    <script src="../js/map.js" type="module" defer></script>
</head>
<body>
    <div id="header" class="glass">
        <div id="logo">
            <div><img src="../assets/capys/map.png" alt="Logo" class="interactive"></div>
            <button id="logo-text">Capymaps</button>
        </div>

        <div id="header-buttons">
            <button>Map</button>
            <button>Account</button>
        </div>
    </div>
    <div id="map-viewport">
        <div id="map-container"></div>
    </div>
    <div id="footer">
        <div id="footer-left"></div>
        <div id="footer-right">
            <div class="glass">
                <button id="create-button" title="Place a capy!"> 
                    <svg id="plus-icon" viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</body>
</html>
