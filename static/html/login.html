<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capymaps Login</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="icon" href="../assets/capys/map.png" type="image/x-icon">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Momo+Trust+Sans:wght@200..800&display=swap" rel="stylesheet">

    <script src="../js/login.js" type="module" defer></script>
</head>
<body>
    <div id="login-container" class="glass">
        <div id="login-logo">
            <img src="../assets/capys/map.png" alt="Capymaps logo">
            <h1>Capymaps</h1>
        </div>

        <form id="login-form">
            <input type="text" id="username" name="username" placeholder="Username" required>
            <input type="password" id="password" name="password" placeholder="Password" required>

            <button type="submit" class="interactive">Log In</button>
        </form>

        <p id="login-message"></p>

        <div id="login-footer">
            <p>Don’t have an account? <a href="#">Sign up</a></p>
        </div>
    </div>
</body>
</html>
